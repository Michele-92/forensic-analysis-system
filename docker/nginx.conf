server {
    listen 80;
    server_name localhost;

    # Max Upload-Groesse (forensische Images koennen gross sein)
    client_max_body_size 10G;

    # SPA: Statische Dateien, Fallback auf index.html
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API-Proxy zum Backend-Container
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-Support (Server-Sent Events fuer Agent-Analyse)
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;

        # Lange Timeouts fuer LLM-Operationen (Multi-Agent: bis 30 Min)
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_connect_timeout 60s;
    }
}
