version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: forensic-backend
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../tools:/app/tools
      - ../logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
      - OLLAMA_BASE_URL=http://ollama:11434
      - API_HOST=0.0.0.0
      - API_PORT=8000
    depends_on:
      - ollama
    networks:
      - forensic-net
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: forensic-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - forensic-net
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: forensic-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - forensic-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: forensic-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - forensic-net
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  ollama-data:
  redis-data:

networks:
  forensic-net:
    driver: bridge