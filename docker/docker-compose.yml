services:
  # ── Backend (FastAPI + Analyse-Pipeline) ─────────────────────
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: forensic-backend
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - LOG_LEVEL=INFO
    depends_on:
      - ollama
    networks:
      - forensic-net
    restart: unless-stopped

  # ── Frontend (React + nginx Reverse-Proxy) ───────────────────
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: forensic-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - forensic-net
    restart: unless-stopped

  # ── Ollama (Lokale LLM-Inferenz) ─────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: forensic-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - forensic-net
    restart: unless-stopped
    # GPU-Support: Auskommentieren falls NVIDIA GPU vorhanden
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  ollama-data:

networks:
  forensic-net:
    driver: bridge
